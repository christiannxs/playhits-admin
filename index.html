<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play Hits Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['DM Sans', 'system-ui', 'sans-serif'],
            },
            colors: {
              'brand-primary': '#E53935',
              'brand-secondary': '#FF6F60',
              'brand-muted': '#2d2020',
              'base-100': '#1c1f26',
              'base-200': '#12151b',
              'base-300': '#2a2e38',
              'base-content': '#f0f4f8',
              'base-content-secondary': '#8b99a8',
            },
            borderRadius: {
              'xl': '1rem',
              '2xl': '1.25rem',
              '3xl': '1.5rem',
            },
            boxShadow: {
              'card': '0 8px 32px -8px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05)',
              'card-hover': '0 16px 48px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08)',
              'sidebar': '8px 0 32px -8px rgba(0,0,0,0.35)',
              'glow': '0 0 0 1px rgba(229, 57, 53, 0.25)',
              'brand': '0 6px 20px -4px rgba(229, 57, 53, 0.35)',
              'inner-soft': 'inset 0 1px 0 0 rgba(255,255,255,0.04)',
            },
            animation: {
              'spin-slow': 'spin 0.9s linear infinite',
              'fade-in': 'fadeIn 0.3s ease-out',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            },
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'DM Sans', system-ui, sans-serif;
        min-height: 100vh;
        background: #12151b;
        background-image:
          radial-gradient(ellipse 120% 80% at 50% -20%, rgba(229, 57, 53, 0.08) 0%, transparent 50%),
          radial-gradient(ellipse 80% 50% at 100% 50%, rgba(42, 46, 56, 0.4) 0%, transparent 50%),
          radial-gradient(ellipse 60% 40% at 0% 100%, rgba(42, 46, 56, 0.3) 0%, transparent 50%);
        background-attachment: fixed;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .main-content-scroll {
        scroll-behavior: smooth;
      }
      .main-content-scroll::-webkit-scrollbar { width: 8px; }
      .main-content-scroll::-webkit-scrollbar-track { background: rgba(18,21,27,0.6); border-radius: 4px; }
      .main-content-scroll::-webkit-scrollbar-thumb { background: #2a2e38; border-radius: 4px; border: 2px solid transparent; background-clip: padding-box; }
      .main-content-scroll::-webkit-scrollbar-thumb:hover { background: #3a3f4b; border: 2px solid transparent; background-clip: padding-box; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(42, 46, 56, 0.8); border-radius: 3px; }
      .transition-smooth { transition: background-color 0.2s ease, color 0.2s ease, box-shadow 0.25s ease, transform 0.2s ease, border-color 0.2s ease, opacity 0.2s ease; }
      input, select, button, [role="button"], a { transition: box-shadow 0.2s ease, border-color 0.2s ease, background-color 0.2s ease, color 0.2s ease; }
      *:focus-visible { outline: 2px solid rgba(229, 57, 53, 0.6); outline-offset: 2px; }
      /* Layout: cabeçalho padrão de página */
      .page-header { padding-bottom: 1.5rem; border-bottom: 1px solid rgba(42, 46, 56, 0.4); }
      .page-header-title { font-size: clamp(1.5rem, 4vw, 1.875rem); font-weight: 700; color: var(--tw-color-base-content, #f0f4f8); }
      .page-header-subtitle { font-size: 0.875rem; color: var(--tw-color-base-content-secondary, #8b99a8); margin-top: 0.25rem; }
      /* Cards de seção consistentes */
      .section-card { background: rgba(28, 31, 38, 0.9); backdrop-filter: blur(8px); border-radius: 1.25rem; border: 1px solid rgba(42, 46, 56, 0.4); box-shadow: 0 8px 32px -8px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05); }
      .section-card:hover { border-color: rgba(42, 46, 56, 0.5); box-shadow: 0 16px 48px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08); }
      @media print {
        body * { visibility: hidden; }
        #print-area, #print-area * { visibility: visible; }
        #print-area { position: absolute; left: 0; top: 0; width: 100%; }
        aside, .no-print { display: none !important; }
        main { padding: 0 !important; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "recharts": "https://aistudiocdn.com/recharts@^3.3.0",
    "@supabase/supabase-js": "https://aistudiocdn.com/@supabase/supabase-js@^2.81.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^0.15.0"
  }
}
</script>
</head>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
